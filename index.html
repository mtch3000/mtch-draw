<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    #rotate-prompt {
      display: none; /* Hidden by default, JS will show it */
      position: fixed;
      inset: 0;
      background: rgba(14, 17, 23, 0.9); /* Semi-transparent */
      backdrop-filter: blur(4px);
      color: #e8eaf0;
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 9999;
      text-align: center;
      padding: 24px;
    }
    #rotate-prompt .rotate-icon {
      font-size: 3rem;
      animation: wiggle 1.2s ease-in-out infinite;
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25%       { transform: rotate(-90deg); } /* Mimics rotating the phone */
      75%       { transform: rotate(0deg); }
    }
  </style>
  <meta name="description" content="Draw Together – a collaborative canvas for everyone">
  <title>Draw Together 🎨</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="rotate-prompt">
    <div class="rotate-icon">📱</div>
    <p>Tip: Draw Together works here, but rotating your phone gives you a wider canvas!</p>
    <button id="rotate-ok-btn" class="btn-primary" style="max-width: 200px; margin-top: 10px;">Got it</button>
  </div>

  <div id="loading-screen">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p>Connecting to canvas…</p>
    </div>
  </div>

  <header id="toolbar">

    <div class="app-brand">
      <span class="brand-icon">✦</span>
      <span class="brand-name">Draw Together</span>
    </div>

    <div class="sep"></div>

    <div class="tool-group">

      <button class="tool-btn active" data-tool="pen" title="Pen – thin sharp line">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        <span>Pen</span>
      </button>

      <button class="tool-btn" data-tool="pencil" title="Pencil – soft thin strokes">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 3a2.828 2.828 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
        </svg>
        <span>Pencil</span>
      </button>

      <button class="tool-btn" data-tool="brush" title="Brush – wide soft stroke">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9.06 11.9l8.07-8.06a2.85 2.85 0 014.03 4.03l-8.06 8.08"/>
          <path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1 1 2.48 1.02 3.5 1.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 00-3-3.02z"/>
        </svg>
        <span>Brush</span>
      </button>

      <button class="tool-btn" data-tool="eraser" title="Eraser – rub out drawing">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 20H7L3 16l10-10 7 7-1.5 1.5"/>
          <path d="M6.5 17.5l3-3"/>
        </svg>
        <span>Eraser</span>
      </button>

    </div>

    <div class="sep"></div>

    <label class="color-wrap" title="Pick a colour">
      <div id="color-swatch"></div>
      <input type="color" id="color-picker" value="#1a1a1a" aria-label="Colour picker">
    </label>

    <div class="sep"></div>

    <div class="size-wrap">
      <span class="size-label">Size</span>
      <input type="range" id="size-slider" min="1" max="40" value="5" aria-label="Brush size">
      <div id="size-dot"></div>
    </div>

    <div class="sep"></div>

    <button id="undo-btn" title="Undo your last stroke (up to 5 of your own strokes)">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7v6h6"/>
        <path d="M3 13c0-4.97 4.03-9 9-9a9 9 0 010 18c-3.73 0-6.93-2.27-8.27-5.5"/>
      </svg>
      <span>Undo</span>
      <span id="undo-count" class="undo-badge">0</span>
    </button>

    <a href="admin.html" id="admin-link" title="Admin Login" aria-label="Admin panel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
    </a>

    <a href="chat.html" id="chat-link" title="Group Chat" aria-label="Chat page" style="display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; margin-left: 6px; border-radius: 50%; background: var(--surface-2); border: 1.5px solid var(--border); color: var(--text-muted); cursor: pointer; transition: all 0.15s; text-decoration: none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>
    </a>

  </header>

  <canvas id="canvas" aria-label="Collaborative drawing canvas"></canvas>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
