<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Draw Together – Group Chat">
  <title>Chat – Draw Together</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .chat-page-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .chat-page-header h1 {
      font-size: 1.2rem;
      margin: 0;
      color: var(--text);
    }

    .chat-page-back-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: var(--font);
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.15s;
    }

    .chat-page-back-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .chat-page-content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .chat-page-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-name-section {
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .chat-player-name-display {
      font-weight: 700;
      color: var(--accent);
      font-size: 0.95rem;
    }

    .chat-name-section button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.15s;
    }

    .chat-name-section button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .chat-groups-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .chat-groups-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }

    .chat-groups-header h2 {
      font-size: 1rem;
      margin: 0;
      color: var(--text);
      flex: 1;
    }

    .btn-create-group {
      background: var(--accent-glow);
      border: 1.5px solid var(--accent);
      color: var(--accent);
      padding: 8px 14px;
      border-radius: 99px;
      font-size: 0.85rem;
      font-weight: 800;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-create-group:hover {
      background: var(--accent);
      color: #1a1000;
    }

    .chat-groups-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-group-item {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .chat-group-item:hover {
      border-color: var(--accent);
      background: var(--surface);
    }

    .chat-group-name {
      font-weight: 700;
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chat-group-meta {
      font-size: 0.82rem;
      color: var(--text-muted);
      display: flex;
      gap: 12px;
    }

    .chat-empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 20px;
    }

    .create-group-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .create-group-modal.visible {
      display: flex;
    }

    .create-group-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
    }

    .create-group-card h2 {
      font-size: 1.1rem;
      margin: 0 0 16px;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group input[type="range"] {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.95rem;
    }

    .form-group input[type="range"] {
      padding: 0;
      height: 6px;
    }

    .max-members-display {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .max-members-display input {
      flex: 1;
    }

    .max-members-value {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--accent);
      min-width: 30px;
      text-align: center;
    }

    .create-group-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .create-group-buttons button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-confirm {
      background: var(--accent);
      color: #1a1000;
    }

    .btn-confirm:hover {
      opacity: 0.9;
    }

    .btn-cancel {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-cancel:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .create-error {
      color: var(--danger);
      font-size: 0.85rem;
      text-align: center;
      margin-top: 12px;
      display: none;
    }

    .create-error.show {
      display: block;
    }

    .hidden {
      display: none !important;
    }

    .chat-room-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .chat-room-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }

    .chat-room-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .chat-room-back-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 6px 8px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .chat-room-back-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .chat-room-title {
      font-size: 0.95rem;
      color: var(--text);
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-room-members {
      font-size: 0.75rem;
      color: var(--success);
      font-weight: 700;
      white-space: nowrap;
    }

    .chat-room-messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: radial-gradient(ellipse 90% 40% at 50% 0%, rgba(245,166,35,0.04) 0%, transparent 75%);
    }

    .chat-room-system {
      align-self: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 10px;
    }

    .chat-room-msg {
      max-width: 80%;
      display: flex;
    }

    .chat-room-msg.me {
      align-self: flex-end;
    }

    .chat-room-msg.them {
      align-self: flex-start;
    }

    .chat-room-bubble {
      border-radius: 12px;
      padding: 8px 10px 6px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .chat-room-msg.me .chat-room-bubble {
      background: var(--accent-glow);
      border-color: rgba(245,166,35,0.35);
      border-bottom-right-radius: 4px;
    }

    .chat-room-msg.them .chat-room-bubble {
      border-bottom-left-radius: 4px;
    }

    .chat-room-name {
      font-size: 0.68rem;
      color: var(--accent);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .chat-room-text {
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.4;
      word-break: break-word;
    }

    .chat-room-time {
      font-size: 0.62rem;
      color: var(--text-muted);
      align-self: flex-end;
    }

    .chat-room-input {
      flex-shrink: 0;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 8px;
    }

    .chat-room-input input {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.9rem;
      padding: 10px;
    }

    .chat-room-send-btn {
      background: var(--accent);
      color: #1a1000;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 800;
      font-family: var(--font);
      cursor: pointer;
    }

    .chat-room-send-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="chat-page-header">
    <h1>💬 Group Chat</h1>
    <button class="chat-page-back-btn" id="back-btn">← Back to Canvas</button>
  </div>

  <div class="chat-page-content">
    <div class="chat-page-main">
      <div class="chat-name-section">
        <span style="color: var(--text-muted); font-size: 0.9rem;">Your name:</span>
        <div class="chat-player-name-display" id="player-name-display">Loading…</div>
        <button id="change-name-btn">✎ Change</button>
      </div>

      <div class="chat-groups-wrapper" id="chat-lobby-view">
        <div class="chat-groups-header">
          <h2>⚡ Live Groups</h2>
          <button class="btn-create-group" id="create-group-btn">+ Create Group</button>
        </div>
        <div class="chat-groups-list" id="groups-list">
          <p class="chat-empty-state">Loading groups…</p>
        </div>
      </div>

      <div class="chat-room-wrapper hidden" id="chat-room-view">
        <div class="chat-room-header">
          <div class="chat-room-header-left">
            <button class="chat-room-back-btn" id="room-back-btn">← Lobby</button>
            <div class="chat-room-title" id="room-title">Room</div>
          </div>
          <div class="chat-room-members" id="room-members">0 online</div>
        </div>

        <div class="chat-room-messages" id="room-messages"></div>

        <div class="chat-room-input">
          <input id="room-input" type="text" maxlength="500" placeholder="Type a message...">
          <button class="chat-room-send-btn" id="room-send-btn">Send</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Create Group Modal -->
  <div class="create-group-modal" id="create-modal">
    <div class="create-group-card">
      <h2>Create New Group</h2>
      
      <form id="create-form" onsubmit="return false;">
        <div class="form-group">
          <label for="group-name">Group Name</label>
          <input type="text" id="group-name" placeholder="e.g. Squad Alpha" maxlength="30" autocomplete="off">
        </div>

        <div class="form-group">
          <label>Max Members</label>
          <div class="max-members-display">
            <input type="range" id="max-members" min="2" max="10" value="10">
            <div class="max-members-value" id="max-members-value">10</div>
          </div>
        </div>

        <p class="create-error" id="create-error"></p>

        <div class="create-group-buttons">
          <button type="button" class="btn-confirm" id="create-confirm">Create</button>
          <button type="button" class="btn-cancel" id="create-cancel">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase & Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <script src="js/config.js"></script>
  <script src="js/chat-page.js"></script>
</body>
</html>
